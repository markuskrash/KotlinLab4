spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: service1-route
          uri: lb://service1
          predicates:
            - Path=/api/service1,/api/service1/**
        - id: service2-route
          uri: lb://service2
          predicates:
            - Path=/api/service2,/api/service2/**

server:
  port: 8888

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO
